# Real ALLRIS pages captured from all seven Hamburg district instances (see
# db/seeds.rb). Each district folder holds one meaningful example of every page
# type the crawler parses:
#
#   vo020.html - a document        (Document#retrieve_from_allris!)
#   to010.html - a meeting agenda  (Meeting#retrieve_from_allris!)
#   to020.html - an agenda item    (AgendaItem#retrieve_from_allris!, has minutes)
#   fr020.html - a party roster    (Party#retrieve_from_allris!)
#   au020.html - a committee roster (Committee#retrieve_members_from_allris!)
#
# The `*_id` values are the real ALLRIS record ids the pages were fetched with;
# tests build records with them so allris_url and id-dependent parsing behave
# exactly as in production. Files are stored as raw ISO-8859-1 bytes, matching
# what Net::HTTP.get returns in production.
